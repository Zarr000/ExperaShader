# Photorealistic shader pack (Iris/OptiFine)
# Original implementation focused on physically based rendering and modern post-processing.

shaderpack=photorealistic-aaa
name=Photorealistic AAA

# Compatibility
# Supports Iris and OptiFine shader pipelines.
version=1.0

# Rendering pipeline
# Deferred GBuffer + SSR + basic post chain (HDR/Bloom/TAA/FXAA).

# GBuffer passes
# 1 = terrain, 1 = water (depending on loader).
gbuffers=1

gbuffers_optional=water

# Provide pass entry points.
# Note: exact pass binding is loader-specific.

# Post-processing
autofade=0


